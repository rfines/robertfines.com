  <rect x="68" y="58" width="46" height="5" rx="2.5" fill="#f59e0b" opacity="0.25"/>
  <rect x="68" y="70" width="38" height="5" rx="2.5" fill="#f59e0b" opacity="0.20"/>
  <rect x="68" y="82" width="42" height="5" rx="2.5" fill="#f59e0b" opacity="0.20"/>

