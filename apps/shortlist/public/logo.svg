<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Top-lit gradient: soft gold → rich amber → deep amber -->
    <linearGradient id="rg" x1="0.35" y1="0" x2="0.65" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="48%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="200" height="200" rx="44" fill="#1c1410"/>

  <!-- ── Document ── -->

  <!-- Drop shadow -->
  <path d="M61,49 L113,49 L139,75 L139,149 Q139,153 135,153 L65,153 Q61,153 61,149 Z"
        fill="#000" fill-opacity="0.25" transform="translate(2,4)"/>

  <!-- Paper body (warm off-white, significantly more visible than before) -->
  <path d="M61,49 L113,49 L139,75 L139,149 Q139,153 135,153 L65,153 Q61,153 61,149 Z"
        fill="#f5ede0" fill-opacity="0.30"/>

  <!-- Paper edge highlights (left + bottom, creates depth) -->
  <path d="M61,53 Q61,49 65,49 L113,49"
        fill="none" stroke="#f0e0cc" stroke-width="0.9" stroke-opacity="0.60"/>
  <path d="M61,53 L61,149 Q61,153 65,153 L135,153 Q139,153 139,149"
        fill="none" stroke="#f0e0cc" stroke-width="0.5" stroke-opacity="0.22"/>

  <!-- Dog-ear: dark triangle showing paper folded back -->
  <path d="M113,49 L139,75 L113,75 Z" fill="#1c1410" fill-opacity="0.75"/>

  <!-- Dog-ear crease line (bright edge of the fold) -->
  <line x1="113" y1="49" x2="139" y2="75"
        stroke="#c8a070" stroke-width="1.1" stroke-opacity="0.70"/>

  <!-- Dog-ear inner fold shadow (small right-angle notch) -->
  <path d="M113,49 L119,49 L113,55 Z" fill="#f5ede0" fill-opacity="0.12"/>

  <!-- Ruled lines — tapered lengths create natural paper feel -->
  <line x1="71" y1="110" x2="129" y2="110" stroke="#c4a060" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.44"/>
  <line x1="71" y1="121" x2="125" y2="121" stroke="#c4a060" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.34"/>
  <line x1="71" y1="132" x2="119" y2="132" stroke="#c4a060" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.24"/>
  <line x1="71" y1="143" x2="111" y2="143" stroke="#c4a060" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.14"/>

  <!-- ── R Lettermark (custom geometric paths, not a font) ── -->

  <!-- Flourish 1: slab serif cap (top of stem) -->
  <rect x="64" y="57" width="21" height="3.5" rx="1.75" fill="url(#rg)"/>

  <!-- Stem -->
  <rect x="68" y="57" width="15" height="86" fill="url(#rg)"/>

  <!-- Bowl: filled D-arc (clockwise semicircle from top to junction) -->
  <!-- Center at (83, 79), radius 22 — rightmost point (105, 79) -->
  <path d="M83,57 A 22 22 0 0 1 83,101 L83,57 Z" fill="url(#rg)"/>

  <!-- Counter: inner D-arc filled with background to punch the bowl hole -->
  <!-- Center at (83, 79), radius 12 — rightmost inner point (95, 79) -->
  <path d="M83,67 A 12 12 0 0 1 83,91 Z" fill="#1c1410"/>

  <!-- Flourish 2: junction spur — the signature flourish of an elegant R -->
  <!-- A gentle curved arch where the leg branches from the bowl -->
  <path d="M83,97 Q88,91 97,91 Q100,92 100,101 L87,101 L83,101 Z"
        fill="url(#rg)"/>

  <!-- Leg (diagonal stroke, lower-right) -->
  <polygon points="87,101 99,101 127,143 115,143" fill="url(#rg)"/>

  <!-- Flourish 3: slab serif foot (bottom of stem) -->
  <rect x="64" y="139.5" width="21" height="3.5" rx="1.75" fill="url(#rg)"/>

  <!-- Flourish 4: slab serif terminal (bottom of leg) -->
  <rect x="112" y="141" width="18" height="3.5" rx="1.75" fill="url(#rg)"/>

  <!-- ── Finishing detail: subtle badge ring ── -->
  <!-- Echoes the seal-quality of premium brand marks -->
  <circle cx="100" cy="100" r="58"
          fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.16"/>
</svg>
